syntax = "proto3";

package inference;

service InferenceNode {
  rpc Prefill(PrefillRequest) returns (PrefillResponse);
  rpc Decode(DecodeRequest) returns (DecodeResponse);
  rpc StreamGenerate(GenerateRequest) returns (stream TokenResponse);
  rpc GetStatus(StatusRequest) returns (NodeStatus);
  
  // GRPO Extensions
  rpc Rollout(RolloutRequest) returns (RolloutResponse);
  rpc Judge(JudgeRequest) returns (JudgeResponse);
  rpc UpdateWeights(WeightUpdateRequest) returns (WeightUpdateResponse);
}

message PrefillRequest {
  string request_id = 1;
  repeated uint32 tokens = 2;
  float temperature = 3;
  uint32 max_tokens = 4;
}

message PrefillResponse {
  string request_id = 1;
  uint32 next_token_id = 2;
  uint32 cache_position = 3;
}

message DecodeRequest {
  string request_id = 1;
  uint32 cache_position = 2;
}

message DecodeResponse {
  string request_id = 1;
  uint32 token_id = 2;
  bool is_finished = 3;
}

message GenerateRequest {
  string request_id = 1;
  repeated uint32 tokens = 2;
  float temperature = 3;
  uint32 max_tokens = 4;
}

message TokenResponse {
  string request_id = 1;
  uint32 token_id = 2;
  bool is_finished = 3;
}

message StatusRequest {}

message NodeStatus {
  uint32 active_sequences = 1;
  float gpu_utilization = 2;
  uint32 queue_depth = 3;
  uint64 cached_tokens = 4;
}

// Weight Management
message WeightUpdateRequest {
  repeated LayerUpdate updates = 1;
}

message LayerUpdate {
  uint32 layer_idx = 1;
  string param_name = 2;           // e.g. "self_attn.q_proj"
  bytes lora_A = 3;                // (rank, in_dim) as bf16
  bytes lora_B = 4;                // (out_dim, rank) as bf16
  repeated uint32 shape_A = 5;
  repeated uint32 shape_B = 6;
  float lora_scale = 7;            // scale/rank factor (e.g. 20.0/8 = 2.5)
}

message WeightUpdateResponse {
  bool success = 1;
  uint64 policy_version = 2;       // monotonic version counter
}

// GRPO Training Loop

message Prompt {
  string prompt_id = 1;
  repeated uint32 tokens = 2;
}

message RolloutRequest {
  string batch_id = 1;
  repeated Prompt prompts = 2;
  uint32 group_size = 3;              // G rollouts per prompt
  float temperature = 4;
  uint32 max_tokens = 5;
}

message RolloutResponse {
  string batch_id = 1;
  repeated PromptRollout results = 2;
}

message PromptRollout {
  string prompt_id = 1;
  repeated Completion completions = 2;
}

message Completion {
  repeated uint32 tokens = 1;
  repeated float log_probs = 2;
  repeated float ref_log_probs = 3; // Policy rollouts through frozen model
}

message JudgeRequest {
  string batch_id = 1;
  repeated uint32 rubric_tokens = 2;  // Shared rubric prefix
  repeated JudgeItem items = 3;
  float temperature = 4;
  uint32 max_tokens = 5;
}

message JudgeItem {
  string item_id = 1;
  repeated uint32 prompt_tokens = 2;  // Suffix: Prompt + Completion
}

message JudgeResponse {
  string batch_id = 1;
  repeated JudgeResult results = 2;
}

message JudgeResult {
  string item_id = 1;
  repeated uint32 verdict_tokens = 2;
  repeated float log_probs = 3;
}
